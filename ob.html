<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open in Obsidian</title>
<style>
  body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1e1e2e; color: #cdd6f4; }
  .card { text-align: center; padding: 2rem; }
  a { color: #89b4fa; }
  #error { display: none; }
</style>
</head>
<body>
<div class="card">
  <p id="redirecting">Redirecting to Obsidian...</p>
  <p id="fallback" style="display:none">
    If Obsidian didn't open, <a id="link" href="#">click here</a>.
  </p>
  <p id="error">Missing <code>f</code> parameter.</p>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const file = params.get('f');
  const vault = params.get('v') || '2026-notes';
  if (file) {
    const url = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + file;
    document.getElementById('link').href = url;
    location.href = url;
    setTimeout(function() { document.getElementById('fallback').style.display = 'block'; }, 1000);
  } else {
    document.getElementById('redirecting').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
</script>
</body>
</html>
